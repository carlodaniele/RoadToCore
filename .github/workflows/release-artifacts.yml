name: Release Artifacts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-core-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image owner
        id: image_owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image_owner.outputs.owner_lc }}/roadtocore-core
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  package-wordpress-adapter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WordPress adapter zip
        run: |
          cd adapters/wordpress
          zip -r ../roadtocore-adapter-${GITHUB_SHA::7}.zip . -x "*.DS_Store"

      - name: Upload WordPress zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: roadtocore-wordpress-adapter-${{ github.sha }}
          path: adapters/roadtocore-adapter-*.zip
          if-no-files-found: error
