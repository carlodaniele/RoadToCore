name: Telegram Poll

on:
  schedule:
    # Runs every 5 minutes as fallback (minimum interval allowed by GitHub Actions).
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [telegram_audio_received]
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r core/requirements.txt

      - name: Validate polling runtime env
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          ROADTOCORE_RUNTIME_ROLE: polling
        run: python -m core.check_github_env polling

      - name: Stage Telegram intake events (polling)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          ROADTOCORE_RUNTIME_ROLE: polling
          ROADTOCORE_OUTBOX_DIR: /tmp/roadtocore_outbox
        run: python -m core.telegram.polling

      - name: Validate intake processor runtime env
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          AI_PROVIDER: google
          ROADTOCORE_RUNTIME_ROLE: intake-processor
        run: python -m core.check_github_env intake-processor

      - name: Process staged intake events (AI + neutral payload)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          AI_PROVIDER: google
          AI_DEFAULT_LANGUAGE: ${{ vars.AI_DEFAULT_LANGUAGE || 'Italian' }}
          GOOGLE_TRANSCRIPTION_MODEL: ${{ vars.GOOGLE_TRANSCRIPTION_MODEL || 'gemini-2.5-flash' }}
          GOOGLE_GENERATION_MODEL: ${{ vars.GOOGLE_GENERATION_MODEL || 'gemini-2.5-flash' }}
          ROADTOCORE_RUNTIME_ROLE: intake-processor
          ROADTOCORE_OUTBOX_DIR: /tmp/roadtocore_outbox
        run: python -m core.workers.intake_processor

      - name: Validate delivery worker runtime env
        env:
          DELIVERY_WORDPRESS_ENABLED: "true"
          DELIVERY_WORDPRESS_ENDPOINT: ${{ secrets.DELIVERY_WORDPRESS_ENDPOINT }}
          DELIVERY_WORDPRESS_USERNAME: ${{ secrets.DELIVERY_WORDPRESS_USERNAME }}
          DELIVERY_WORDPRESS_APP_PASSWORD: ${{ secrets.DELIVERY_WORDPRESS_APP_PASSWORD }}
          DELIVERY_ASTRO_ENABLED: ${{ vars.DELIVERY_ASTRO_ENABLED || 'false' }}
          DELIVERY_ASTRO_ADAPTER_DIST: ${{ vars.DELIVERY_ASTRO_ADAPTER_DIST || '' }}
          DELIVERY_ASTRO_CONTENT_DIR: ${{ vars.DELIVERY_ASTRO_CONTENT_DIR || '' }}
          DELIVERY_ASTRO_PUBLIC_DIR: ${{ vars.DELIVERY_ASTRO_PUBLIC_DIR || '' }}
          DELIVERY_ASTRO_ASSETS_DIR: ${{ vars.DELIVERY_ASTRO_ASSETS_DIR || '' }}
          ROADTOCORE_RUNTIME_ROLE: delivery-worker
        run: python -m core.check_github_env delivery-worker

      - name: Deliver pending outbox payloads
        env:
          DELIVERY_WORDPRESS_ENABLED: "true"
          DELIVERY_WORDPRESS_ENDPOINT: ${{ secrets.DELIVERY_WORDPRESS_ENDPOINT }}
          DELIVERY_WORDPRESS_USERNAME: ${{ secrets.DELIVERY_WORDPRESS_USERNAME }}
          DELIVERY_WORDPRESS_APP_PASSWORD: ${{ secrets.DELIVERY_WORDPRESS_APP_PASSWORD }}
          DELIVERY_WORDPRESS_TIMEOUT: ${{ vars.DELIVERY_WORDPRESS_TIMEOUT || '30' }}
          DELIVERY_RETRIES: ${{ vars.DELIVERY_RETRIES || '2' }}
          DELIVERY_RETRY_BACKOFF_SECONDS: ${{ vars.DELIVERY_RETRY_BACKOFF_SECONDS || '2.0' }}
          DELIVERY_ASTRO_ENABLED: ${{ vars.DELIVERY_ASTRO_ENABLED || 'false' }}
          DELIVERY_ASTRO_NODE_BIN: ${{ vars.DELIVERY_ASTRO_NODE_BIN || 'node' }}
          DELIVERY_ASTRO_ADAPTER_DIST: ${{ vars.DELIVERY_ASTRO_ADAPTER_DIST || '' }}
          DELIVERY_ASTRO_CONTENT_DIR: ${{ vars.DELIVERY_ASTRO_CONTENT_DIR || '' }}
          DELIVERY_ASTRO_PUBLIC_DIR: ${{ vars.DELIVERY_ASTRO_PUBLIC_DIR || '' }}
          DELIVERY_ASTRO_ASSETS_DIR: ${{ vars.DELIVERY_ASTRO_ASSETS_DIR || '' }}
          ROADTOCORE_RUNTIME_ROLE: delivery-worker
          ROADTOCORE_OUTBOX_DIR: /tmp/roadtocore_outbox
        run: python -m core.workers.delivery_worker

      - name: Upload outbox artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roadtocore-outbox-${{ github.run_id }}
          path: /tmp/roadtocore_outbox
          if-no-files-found: ignore
          retention-days: 7
